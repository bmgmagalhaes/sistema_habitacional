{% extends 'base.html' %}

{% block title %}
Painel de Gestão
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5 col-lg-4">

            <div class="card shadow-lg border-0">

                <div class="card-body p-4">

                    <div class="text-center mb-4">

                        <h2>🏛️</h2>

                        <h3 class="fw-bold">
                            Painel de Gestão
                        </h3>

                        <p class="text-muted mb-0">
                            Sistema Municipal de Habitação
                        </p>

                    </div>

                    {% if form.errors %}

                        <div class="alert alert-danger">

                            Usuário ou senha inválidos.

                        </div>

                    {% endif %}

                    <form method="post">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Usuário

                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                required
                                autofocus
                                value="{{ form.username.value|default:'' }}">
                                

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Senha

                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Entrar

                        </button>

                    </form>

                </div>

            </div>

            <div class="text-center mt-3">

                <small class="text-muted">

                    Acesso restrito aos gestores do Sistema Habitacional.

                </small>

            </div>

        </div>

    </div>

</div>

{% endblock %}
